/* Desktop (>1024px) - Com moldura elegante */
@media (min-width: 1025px) {
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    min-height: 100vh;
  }
  
  #root {
    max-width: 390px;
    max-height: 844px;
    height: 90vh;
    position: relative;
    background: #000;
    border-radius: 45px;
    padding: 10px;
    box-shadow: 
      0 0 0 2px #333,
      0 20px 60px rgba(0,0,0,0.4),
      0 10px 30px rgba(0,0,0,0.3);
    animation: phoneEnter 0.6s ease-out;
    overflow: hidden;
  }
  
  /* Notch suave no topo */
  #root::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 30px;
    background: #000;
    border-radius: 0 0 20px 20px;
    z-index: 1000;
  }
  
  /* Câmara discreta */
  #root::after {
    content: '';
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 10px;
    height: 10px;
    background: #1a1a2e;
    border-radius: 50%;
    z-index: 1001;
    box-shadow: inset 0 0 3px rgba(255,255,255,0.2);
  }
  
  /* Animação de entrada */
  @keyframes phoneEnter {
    0% { opacity: 0; transform: translateY(40px) scale(0.97); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
}

/* Tablet (769px - 1024px) */
@media (min-width: 769px) and (max-width: 1024px) {
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

morning: isWeekend ? "☀️ Bom fim de semana em Vilamoura!" : "☀️ Bom dia! Pronto para explorar?",
lunch: "🍽️ Hora de almoço? Veja os nossos restaurantes!",
afternoon: "🌊 Boa tarde! A marina espera por si.",
evening: "🌙 Boa noite! Descubra a vida noturna.",
night: "✨ Bem-vindo a Vilamoura!"
},
en: {
morning: isWeekend ? "☀️ Great weekend in Vilamoura!" : "☀️ Good morning! Ready to explore?",
lunch: "🍽️ Lunch time? Check out our restaurants!",
afternoon: "🌊 Good afternoon! The marina awaits.",
evening: "🌙 Good evening! Discover the nightlife.",
night: "✨ Welcome to Vilamoura!"
},
fr: {
morning: isWeekend ? "☀️ Excellent week-end à Vilamoura !" : "☀️ Bonjour ! Prêt à explorer ?",
lunch: "🍽️ L'heure du déjeuner ? Découvrez nos restaurants !",
afternoon: "🌊 Bon après-midi ! La marina vous attend.",
evening: "🌙 Bonsoir ! Découvrez la vie nocturne.",
night: "✨ Bienvenue à Vilamoura !"
},
de: {
morning: isWeekend ? "☀️ Schönes Wochenende in Vilamoura!" : "☀️ Guten Morgen! Bereit zu entdecken?",
lunch: "🍽️ Mittagszeit? Entdecken Sie unsere Restaurants!",
afternoon: "🌊 Guten Nachmittag! Der Yachthafen wartet auf Sie.",
evening: "🌙 Guten Abend! Entdecken Sie das Nachtleben.",
night: "✨ Willkommen in Vilamoura!"
},
es: {
morning: isWeekend ? "☀️ ¡Gran fin de semana en Vilamoura!" : "☀️ ¡Buenos días! ¿Listo para explorar?",
lunch: "🍽️ ¿Hora de comer? ¡Mira nuestros restaurantes!",
afternoon: "🌊 ¡Buenas tardes! La marina te espera.",
evening: "🌙 ¡Buenas noches! Descubre la vida nocturna.",
night: "✨ ¡Bienvenido a Vilamoura!"
}
};
const m = messages[lang] || messages.en;
if (hour >= 6 && hour < 12) return m.morning;
if (hour >= 12 && hour < 14) return m.lunch;
if (hour >= 14 && hour < 19) return m.afternoon;
if (hour >= 19 && hour < 23) return m.evening;
return m.night;
};

function App() {
const [view, setView] = useState('splash');
const [lang, setLang] = useState('pt');
const [navLevel, setNavLevel] = useState('categorias');
const [catAtiva, setCatAtiva] = useState(null);
const [subcatAtiva, setSubcatAtiva] = useState(null);
const [query, setQuery] = useState('');
const [locais, setLocais] = useState([]);
const [loading, setLoading] = useState(true);
const [error, setError] = useState(null);
const [dontShowAgain, setDontShowAgain] = useState(false);
const [selectedLang, setSelectedLang] = useState('pt');
const [pushSupported, setPushSupported] = useState(false);
const [pushSubscribed, setPushSubscribed] = useState(false);
const [pushLoading, setPushLoading] = useState(false);
const mapRef = useRef(null);
const googleMap = useRef(null);
const markers = useRef([]);
const directionsRenderer = useRef(null);
const t = i18n[lang] || i18n.en;
const personalizedMessage = getPersonalizedMessage(lang);

useEffect(() => {
const checkPushSupport = async () => {
if ('serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window) {
setPushSupported(true);
try {
const registration = await navigator.serviceWorker.ready;
const subscription = await registration.pushManager.getSubscription();
setPushSubscribed(!!subscription);
} catch (err) {
console.log('⚠️ Push check error:', err);
}
}
};
checkPushSupport();
}, []);

// ✅ PEDIR PERMISSÃO E SUBSCREVER (COM TRADUÇÕES) - FUNÇÃO async CORRETA
const requestPushPermission = async () => {
setPushLoading(true);

// ✅ DETETAR iOS E MOSTRAR AVISO
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
if (isIOS) {
alert(t.push.iosWarning);
setPushLoading(false);
return;
}

try {
const permission = await Notification.requestPermission();
if (permission !== 'granted') {
alert(t.push.permissionDenied);
setPushLoading(false);
return;
}

// ✅ SERVICE WORKER CORRETO (sw.js unificado)
const registration = await navigator.serviceWorker.register('/app/sw.js');

// ⚠️ ============================================
// ⚠️ COLOCA A TUA VAPID_KEY ABAIXO (entre aspas)
// ⚠️ Firebase Console → Project Settings → Cloud Messaging → Web Push certificates
// ⚠️ ============================================
const VAPID_KEY = 'BEXGIMrOwMJ6BAppO1yi6DO16bfh0mYoSS_kOlyLaQRM-hBw51eZ6dznz25jHt3LHZHwlkw_FzEZ_b7bApjks58';
// ⚠️ ============================================

const token = await messaging.getToken({ vapidKey: VAPID_KEY });
await db.collection('push_subscriptions').add({
token,
createdAt: firebase.firestore.FieldValue.serverTimestamp(),
platform: navigator.platform,
userAgent: navigator.userAgent
});
setPushSubscribed(true);
alert(t.push.activationSuccess);
} catch (err) {
console.error('❌ Erro push:', err);
alert(t.push.activationError);
}
setPushLoading(false);
};

// ✅ CANCELAR SUBSCRIÇÃO (COM TRADUÇÃO)
const unsubscribePush = async () => {
try {
const registration = await navigator.serviceWorker.ready;
const subscription = await registration.pushManager.getSubscription();
if (subscription) {
await subscription.unsubscribe();
const tokens = await db.collection('push_subscriptions')
.where('token', '==', subscription.endpoint)
.get();
tokens.forEach(doc => doc.ref.delete());
setPushSubscribed(false);
alert(t.push.deactivationSuccess);
}
} catch (err) {
console.error('❌ Erro unsubscribe:', err);
}
};

useEffect(() => {
const savedLang = localStorage.getItem('vilamoura_lang');
if (savedLang) { setLang(savedLang); setSelectedLang(savedLang); }
}, []);

const handleEnter = () => {
const hasSeenWelcome = localStorage.getItem('vilamoura_welcome_seen');
if (hasSeenWelcome) { setView('menu'); } else { setView('welcome'); }
};

const handleStart = () => {
if (dontShowAgain) { localStorage.setItem('vilamoura_welcome_seen', 'true'); }
localStorage.setItem('vilamoura_lang', selectedLang);
setLang(selectedLang);
setView('menu');
};

useEffect(() => {
if (view === 'menu') {
setLoading(true); setError(null);
db.collection('locais').get()
.then((snapshot) => {
const dados = snapshot.docs.map(doc => doc.data());
setLocais(dados); setLoading(false);
if (dados.length === 0) setError('Nenhum negócio encontrado.');
})
.catch((err) => { console.error("Erro Firestore:", err); setError('Erro ao carregar dados.'); setLoading(false); });
}
}, [view]);

useEffect(() => {
if (view === 'menu' && !googleMap.current && mapRef.current) {
googleMap.current = new google.maps.Map(mapRef.current, {
center: { lat: 37.076, lng: -8.118 }, zoom: 15, disableDefaultUI: true,
styles: [{ featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }]
});
directionsRenderer.current = new google.maps.DirectionsRenderer({
map: googleMap.current,
polylineOptions: { strokeColor: "#003366", strokeWeight: 5 },
suppressMarkers: true
});
}
}, [view]);

window.calcularRota = function(lat, lng) {
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
if (isIOS) {
window.open(`http://maps.apple.com/?daddr=${lat},${lng}`, '_blank');
return;
}
if (!navigator.geolocation) {
alert('A geolocalização não é suportada. A abrir Google Maps...');
window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
return;
}
navigator.geolocation.getCurrentPosition(
(pos) => {
const service = new google.maps.DirectionsService();
service.route({
origin: { lat: pos.coords.latitude, lng: pos.coords.longitude },
destination: { lat: parseFloat(lat), lng: parseFloat(lng) },
travelMode: google.maps.TravelMode.WALKING
}, (result, status) => {
if (status === 'OK' && directionsRenderer.current) {
directionsRenderer.current.setDirections(result);
} else {
alert('Não foi possível calcular a rota. A abrir Google Maps...');
window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
}
});
},
(err) => {
alert('Ative a localização para calcular rotas. A abrir Google Maps...');
window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
},
{ enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
);
};

const openMap = (items) => {
setNavLevel('mapa');
if(directionsRenderer.current) directionsRenderer.current.setDirections({routes: []});
markers.current.forEach(m => m.setMap(null));
const list = Array.isArray(items) ? items : [items];
list.forEach(loc => {
const marker = new google.maps.Marker({
position: { lat: loc.lat, lng: loc.lng }, map: googleMap.current,
label: { text: loc.icon || '📍', color: 'white' }
});
const infoText = getInfoText(loc.info, lang);
const imgSrc = cleanImageUrl(loc.img);
const fotos = loc.fotos || [];
const fotosParaUsar = fotos.length > 0 ? fotos : (imgSrc ? [imgSrc] : []);
let galleryHTML = '';
if (fotosParaUsar.length > 0) {
galleryHTML = `
<div style="display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; padding-bottom:8px; scrollbar-width:thin; scrollbar-color:#c5a059 #f1f1f1;">
${fotosParaUsar.slice(0, 6).map((foto, idx) => {
const urlLimpa = cleanImageUrl(foto);
if (!urlLimpa) return '';
return `
<img src="${urlLimpa}"
style="width:80px; height:80px; border-radius:8px; object-fit:cover; flex-shrink:0; border:2px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,0.15); cursor:pointer; background:#f1f1f1;"
onerror="this.style.background='#eee'; this.src='https://via.placeholder.com/80?text=Foto+'+(${idx+1})"
onclick="this.style.width=this.style.width==='160px'?'80px':'160px'; this.style.height=this.style.height==='160px'?'80px':'160px'">
`;
}).filter(html => html !== '').join('')}
</div>
`;
}
const content = `
<div style="width:240px; padding:8px;">
${galleryHTML}
<h3 style="margin:10px 0 5px 0; color:#003366; font-size:16px; font-weight:bold;">${loc.nome || 'Sem nome'}</h3>
<p style="font-size:12px; margin-bottom:10px; color:#666; line-height:1.4;">${infoText}</p>
<div class="info-buttons">
<button onclick="window.calcularRota(${loc.lat}, ${loc.lng})" class="btn-info bg-blue" style="font-size:12px; padding:10px;">${t.route}</button>
${loc.tel ? `<a href="tel:${loc.tel}" class="btn-info bg-green" style="font-size:12px; padding:10px;">${t.call}</a>` : ''}
${loc.web && loc.web !== '#' ? `<a href="${loc.web}" target="_blank" class="btn-info bg-gold" style="font-size:12px; padding:10px;">${t.visit}</a>` : ''}
</div>
</div>
`;
const iw = new google.maps.InfoWindow({ content });
marker.addListener('click', () => iw.open(googleMap.current, marker));
markers.current.push(marker);
});
if(!Array.isArray(items)) { googleMap.current.setCenter({lat: items.lat, lng: items.lng}); googleMap.current.setZoom(17); }
else { googleMap.current.setZoom(14); googleMap.current.setCenter({ lat: 37.076, lng: -8.118 }); }
};

const getDestaqueFromPlan = (loc) => {
if (loc.nivel_destaque) return loc.nivel_destaque;
if (loc.subscricao?.ativo) {
const plano = loc.subscricao.plano;
if (plano === 'ouro') return 3;
if (plano === 'prata') return 2;
}
return 0;
};

const getSortedLocais = (locais) => {
return [...locais].sort((a, b) => {
const aDestaque = getDestaqueFromPlan(a);
const bDestaque = getDestaqueFromPlan(b);
if (aDestaque !== bDestaque) return bDestaque - aDestaque;
return (a.nome || '').localeCompare(b.nome || '');
});
};

const handleCatClick = (cat) => {
if (cat.subcats && cat.subcats.length > 0) {
setCatAtiva(cat);
setNavLevel('subcategorias');
} else {
setCatAtiva(cat);
setSubcatAtiva(null);
setNavLevel('locais');
}
};

const handleSubcatClick = (subcat) => {
setSubcatAtiva(subcat);
setNavLevel('locais');
};

const handleBack = () => {
if (navLevel === 'locais' && subcatAtiva) {
setSubcatAtiva(null);
setNavLevel('subcategorias');
} else if (navLevel === 'locais' || navLevel === 'subcategorias') {
setCatAtiva(null);
setSubcatAtiva(null);
setNavLevel('categorias');
} else if (navLevel === 'mapa') {
setNavLevel(catAtiva ? (subcatAtiva ? 'locais' : 'subcategorias') : 'categorias');
}
};

// ✅ FILTRAR LOCAIS - VERSÃO FLEXÍVEL
const getFilteredLocais = () => {
let filtered = locais;
if (query.length > 0) {
const q = query.toLowerCase().trim();
filtered = filtered.filter(l => {
const nome = (l.nome || '').toLowerCase();
const infoPt = (l.info?.pt || '').toLowerCase();
const infoEn = (l.info?.en || '').toLowerCase();
return nome.includes(q) || infoPt.includes(q) || infoEn.includes(q);
});
} else if (catAtiva) {
const catId = (catAtiva.id || '').toLowerCase();
filtered = filtered.filter(l => {
const lCat = (l.cat || '').toLowerCase();
if (lCat !== catId) return false;
if (subcatAtiva) {
const subcatId = (subcatAtiva.id || '').toLowerCase();
const lSubcat = (l.subcat || '').toLowerCase();
return lSubcat === subcatId;
}
return true;
});
}
return filtered;
};

const filtered = getFilteredLocais();

if (view === 'splash') {
return (<div className="splash-screen"><img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh2RRJgYenNf-1LjVFu47Lj4dmOnLy9PPAcXvXN2zLle3kx2vlEAQXtIs6_C6g9H-90RCQqjSj41N6ZfeDT35GG17m8VJ3-h4iC041wDTLKTZJ7QAs5511gf8OimILN-XyQlT4v3Brs7yWpQSqL_DuvLKJrLvacbYvb7y9VZFEOyZ6FVTwLtPFtI_Xt5nZG/w400-h225/Vilamoura-Select_YourIndependentGuidetoVilamoura_retangular_2-.gif" alt="Vilamoura Select" style={{ width: '95%', maxWidth: '420px', height: 'auto', marginBottom: '35px', borderRadius: '8px' }} /><div style={{ position: 'absolute', bottom: '40px', left: '0', right: '0', display: 'flex', justifyContent: 'center', padding: '0 20px' }}><button style={{ width: '210px', padding: '15px 24px', background: '#003366', color: '#ffffff', border: '2px solid #ffffff', borderRadius: '32px', fontWeight: 'bold', fontSize: '15px', cursor: 'pointer' }} onClick={handleEnter}>{t.enter}</button></div></div>);
}

if (view === 'welcome') {
return (<div className="welcome-screen"><div className="welcome-content"><div className="welcome-logo"><img src="/app/icon-512.png" alt="Vilamoura Select" /></div><h1 className="welcome-title">{i18n[selectedLang].welcome}</h1><p className="welcome-text">{i18n[selectedLang].welcomeText}</p><div style={{marginBottom: '25px'}}><div className="lang-select-title">{i18n[selectedLang].selectLang}</div><div className="lang-grid-flags">{languages.map(l => (<div key={l.code} className={`lang-flag-option ${selectedLang === l.code ? 'selected' : ''}`} onClick={() => setSelectedLang(l.code)}><img src={l.flag} alt={l.name} style={{ width: '24px', height: '16px', objectFit: 'cover', borderRadius: '2px' }} /></div>))}</div></div><button className="welcome-btn" onClick={handleStart}>{i18n[selectedLang].start}</button><label className="welcome-checkbox"><input type="checkbox" checked={dontShowAgain} onChange={(e) => setDontShowAgain(e.target.checked)} />{i18n[selectedLang].dontShowAgain}</label></div></div>);
}

return (
<div style={{height: '100%'}}>
<div className="lang-bar">{['pt','en','fr','de','es'].map(l => (<button key={l} className={`lang-btn ${lang === l ? 'active' : ''}`} onClick={() => setLang(l)}>{l.toUpperCase()}</button>))}</div>
<div className="personalized-message">{personalizedMessage}</div>

{/* ✅ BARRA DE NOTIFICAÇÕES PUSH - COM TRADUÇÕES */}
{pushSupported && (
<div className={`push-bar ${pushSubscribed ? 'active' : ''}`}>
<span>
{pushSubscribed ? t.push.active : t.push.inactive}
</span>
{pushSubscribed ? (
<button className="push-btn danger" onClick={unsubscribePush}>
{t.push.deactivate}
</button>
) : (
<button className="push-btn" onClick={requestPushPermission} disabled={pushLoading}>
{pushLoading ? t.push.loading : t.push.activate}
</button>
)}
</div>
)}

<div className="app-content">
<div className="menu-view" style={{ display: navLevel !== 'mapa' ? 'block' : 'none' }}>
{navLevel !== 'categorias' && (
<div className="nav-header">
<button onClick={handleBack} className="btn-back-nav">← {t.back}</button>
<span className="nav-title">
{subcatAtiva ? subcatAtiva.nome : (catAtiva ? t.cats[catAtiva.id] : '')}
</span>
</div>
)}
<div className="search-area">
<div className="search-box">
<i className="fas fa-search"></i>
<input type="text" placeholder={t.search} value={query} onChange={(e) => {setQuery(e.target.value); if(navLevel !== 'categorias') setNavLevel('locais');}} />
</div>
</div>
{error && <div className="error-msg">⚠️ {error}</div>}
{loading ? (
<div className="loader"><i className="fas fa-spinner fa-spin"></i> {t.loading}</div>
) : query.length > 0 || navLevel === 'locais' ? (
<div>
{filtered.length === 0 ? (
<div style={{padding:'20px', textAlign:'center', color:'#666'}}>Nenhum resultado</div>
) : null}
{getSortedLocais(filtered)
.map(l => {
const destaqueNivel = getDestaqueFromPlan(l);
const isFeatured = destaqueNivel > 0;
const featuredBorder = destaqueNivel === 3 ? '#ffd700' : destaqueNivel === 2 ? '#c0c0c0' : '#cd7f32';
const featuredBg = isFeatured ? 'linear-gradient(135deg, #fff9e6 0%, #fff 100%)' : '#fff';
return (
<div
key={l.id || l.nome}
className="item-row"
onClick={() => openMap(l)}
style={{
border: isFeatured ? `2px solid ${featuredBorder}` : '1px solid #eee',
background: featuredBg,
marginBottom: '10px'
}}
>
{isFeatured && (
<div className="featured-badge" style={{ zIndex: 10 }}>
⭐ {destaqueNivel === 3 ? 'OURO' : destaqueNivel === 2 ? 'PRATA' : 'BRONZE'}
</div>
)}
<img src={cleanImageUrl(l.img)} onError={(e) => {e.target.src='https://via.placeholder.com/50?text=?'}} style={{borderRadius: isFeatured ? '12px' : '8px'}} />
<div>
<div style={{fontWeight: isFeatured ? 'bold' : 'normal', color: isFeatured ? '#003366' : '#333'}}>{l.nome}</div>
<div style={{fontSize:11}}>{getInfoText(l.info, lang)}</div>
</div>
</div>
);
})}
</div>
) : navLevel === 'categorias' ? (
<div>
<div className="grid-cats">
{CATEGORIAS.map(c => (
<div key={c.id} className="cat-card" onClick={() => handleCatClick(c)}>
<i className={`fas ${c.icon}`}></i>
<div>{t.cats[c.id]}</div>
</div>
))}
</div>
<button className="explore-below-btn" onClick={() => openMap(locais)}>
<i className="fas fa-map-marked-alt"></i> {t.explore}
</button>
</div>
) : navLevel === 'subcategorias' && catAtiva ? (
<div className="grid-cats">
{catAtiva.subcats.map(s => (
<div key={s.id} className="subcat-card" onClick={() => handleSubcatClick(s)}>
<i className={`fas ${s.icon}`}></i>
<div>{s.nome}</div>
</div>
))}
</div>
) : null}
</div>
<div className="map-view" style={{ visibility: navLevel === 'mapa' ? 'visible' : 'hidden' }}>
<button className="btn-back-map" onClick={handleBack}>{t.back}</button>
<div ref={mapRef} id="map-canvas"></div>
</div>
</div>
</div>
);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('/app/sw.js')
.then(reg => { console.log('✅ Service Worker registado!', reg.scope); reg.update(); })
.catch(err => console.log('❌ Erro no Service Worker:', err));
});
}
</script>
</body>
</html>
