    // ============================================

    // ============================================
    // FUNÇÕES DE TRADUÇÃO
    // ============================================
    function slugify(text) {
      return text.toString().toLowerCase()
        .replace(/[^\w\s-]/g, '')
        .replace(/[\s_-]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    }
    
    function getTranslatedInfo(business) {
      const lang = currentLanguage;
      const id = business.id || slugify(business.nome);
      return businessTranslations?.[id]?.[lang] || business.info_pt || business.info || "";
    }
    
    function getTranslatedSubcat(subcatKey) {
      const lang = currentLanguage;
      const subcats = {
        pt: { steakhouse:"Steakhouse", seafood:"Marisco", chineses:"Chineses", italian:"Italiano", thai:"Tailandês", indian:"Indiano", portuguese:"Português", sports:"Sports Bar", "wine-cocktail":"Wine & Cocktail", beach:"Beach Bar", nightclub:"Discoteca" },

        de: { steakhouse:"Steakhaus", seafood:"Meeresfrüchte", chineses:"Chinesisch", italian:"Italienisch", thai:"Thailändisch", indian:"Indisch", portuguese:"Portugiesisch", sports:"Sportbar", "wine-cocktail":"Wein & Cocktails", beach:"Strandbar", nightclub:"Nachtclub" }
      };
      return subcats[lang]?.[subcatKey] || subcatKey;
    }
    
    function getUIText(key) {
      const texts = {
        pt: { todos:"Todos", hospedar:"Hospedar", comer:"Comer", beber:"Beber", comprar:"Comprar", servicos:"Serviços", loading:"A carregar...", noResults:"Nenhum negócio encontrado." },
        en: { todos:"All", hospedar:"Stay", comer:"Eat", beber:"Drink", comprar:"Shop", servicos:"Services", loading:"Loading...", noResults:"No businesses found." },
        fr: { todos:"Tous", hospedar:"Séjour", comer:"Manger", beber:"Boire", comprar:"Acheter", servicos:"Services", loading:"Chargement...", noResults:"Aucun établissement trouvé." },
        de: { todos:"Alle", hospedar:"Übernachten", comer:"Essen", beber:"Trinken", comprar:"Einkaufen", servicos:"Dienste", loading:"Wird geladen...", noResults:"Keine Geschäfte gefunden." }
      };
      return texts[currentLanguage]?.[key] || key;
    }
    
    // ============================================
    // MUDAR IDIOMA
    // ============================================
    function cycleLanguage() {
      const langs = ['pt', 'en', 'fr', 'de'];
      const flags = { pt:'🇵🇹 PT', en:'🇬🇧 EN', fr:'🇫🇷 FR', de:'🇩🇪 DE' };
      const idx = langs.indexOf(currentLanguage);
      currentLanguage = langs[(idx + 1) % langs.length];
      localStorage.setItem('vilamoura-lang', currentLanguage);
      document.getElementById('langBtn').textContent = flags[currentLanguage];
      renderApp();
    }
    
    // ============================================
    // FILTRAR CATEGORIA
    // ============================================
    function filterCategory(cat, btn) {
      currentCategory = cat;
      currentSubcat = null;
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderSubcats();
      renderBusinesses();
    }
    
    function filterSubcat(subcat, btn) {
      currentSubcat = subcat === currentSubcat ? null : subcat;
      document.querySelectorAll('.subcat-btn').forEach(b => b.classList.remove('active'));
      if (btn && currentSubcat) btn.classList.add('active');
      renderBusinesses();
    }
    
    // ============================================
    // RENDERIZAR SUBCATEGORIAS
    // ============================================
    function renderSubcats() {
      const container = document.getElementById('subcatsContainer');
      const subcatsByCat = {
        comer: ['steakhouse', 'seafood', 'chineses', 'italian', 'thai', 'indian', 'portuguese'],
        beber: ['sports', 'wine-cocktail', 'beach', 'nightclub']
      };
      const subcats = subcatsByCat[currentCategory] || [];
      
      if (subcats.length === 0) {
        container.innerHTML = '';
        return;
      }
      
      container.innerHTML = subcats.map(sc => 
        `<button class="subcat-btn ${currentSubcat===sc?'active':''}" onclick="filterSubcat('${sc}', this)">${getTranslatedSubcat(sc)}</button>`
      ).join('');
    }
    
    // ============================================
    // RENDERIZAR NEGÓCIOS
    // ============================================
    function renderBusinesses() {
      const container = document.getElementById('businessesContainer');
      
      let filtered = allBusinesses.filter(b => 
        (currentCategory === 'todos' || b.cat === currentCategory) &&
        (!currentSubcat || b.subcat === currentSubcat)
      );
      
      if (filtered.length === 0) {
        container.innerHTML = `<div class="loading">${getUIText('noResults')}</div>`;
        return;
      }
      
      container.innerHTML = filtered.map(b => {
        const businessId = b.id || slugify(b.nome);
        const subcatText = getTranslatedSubcat(b.subcat);
        const infoText = getTranslatedInfo(b);
        
        return `
          <div class="business-card" data-id="${businessId}">
            <img src="${b.img || ''}" alt="${b.nome}" class="business-img" onerror="this.style.background='linear-gradient(135deg,#2d5016,#1a3009)'">
            <div class="business-info">
              <h3>${b.nome}</h3>
              <p class="subcat">${subcatText}</p>
              <p class="info">${infoText}</p>
              <div class="business-actions">
                <a href="tel:${b.tel}" class="btn-call">📞</a>
                <a href="${b.web}" target="_blank" class="btn-web">🌐</a>
                <a href="https://www.google.com/maps?q=${b.lat},${b.lng}" target="_blank" class="btn-map">📍</a>
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      // Guarda para re-renderizar ao mudar língua
      window.currentBusinesses = filtered;
    }
    
    // ============================================
    // CARREGAR DADOS (Firebase ou Mock)
    // ============================================
    function loadBusinesses() {
      // MOCK DATA para teste (substitui por Firebase quando pronto)
      allBusinesses = [
        { nome:"Tivoli Marina Vilamoura", cat:"hospedar", subcat:"hotel", lat:37.0789, lng:-8.1189, tel:"+351289320500", web:"https://www.tivolihotels.com", img:"", info:"Hotel de luxo na marina", id:"tivoli-marina" },
        { nome:"Sal & Fogo", cat:"comer", subcat:"steakhouse", lat:37.07952906142937, lng:-8.12068946898374, tel:"+351289117202", web:"https://rest-salefogo.com/", img:"", info:"Steakhouse com grelhados de qualidade", id:"sal-fogo" },
        { nome:"El Cristo", cat:"comer", subcat:"seafood", lat:37.076063310056995, lng:-8.11418975364252, tel:"+351289246161", web:"https://elcristovilamoura.localo.site/", img:"", info:"Marisco fresco e especialidades", id:"el-cristo" },
        { nome:"Kiss Bar", cat:"beber", subcat:"beach", lat:37.0775, lng:-8.1175, tel:"+351289123456", web:"https://kissbar.pt", img:"", info:"Bar animado com cocktails e música", id:"kiss-bar" },
        { nome:"Oriental Shopping", cat:"comprar", subcat:"gifts", lat:37.0780, lng:-8.1180, tel:"+351289987654", web:"", img:"", info:"Artigos orientais e decoração única", id:"oriental-shopping" },
        { nome:"Centro Médico Vilamoura", cat:"servicos", subcat:"health", lat:37.0770, lng:-8.1170, tel:"+351289111222", web:"", img:"", info:"Consultas de medicina geral e especialidades", id:"centro-medico" }
      ];
      
      // Se Firebase estiver disponível, carrega da base de dados
      if (typeof firebase !== 'undefined' && firebase.firestore) {
        firebase.firestore().collection('locais').get().then(snapshot => {
          const fromFirebase = [];
          snapshot.forEach(doc => fromFirebase.push({ id: doc.id, ...doc.data() }));
          if (fromFirebase.length > 0) allBusinesses = fromFirebase;
          renderSubcats();
          renderBusinesses();
        }).catch(err => {
          console.warn('⚠️ Firebase error, usando mock data:', err);
          renderSubcats();
          renderBusinesses();
        });
      } else {
        renderSubcats();
        renderBusinesses();
      }
    }
    
    // ============================================
    // RENDERIZAR APP COMPLETA
    // ============================================
    function renderApp() {
      // Atualiza textos da UI
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        el.textContent = getUIText(key);
      });
      // Re-renderiza negócios com novas traduções
      renderBusinesses();
    }
    
    // ============================================
    // INICIALIZAÇÃO
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
      // Define idioma inicial no botão
      const flags = { pt:'🇵🇹 PT', en:'🇬🇧 EN', fr:'🇫🇷 FR', de:'🇩🇪 DE' };
      document.getElementById('langBtn').textContent = flags[currentLanguage];
      
      // Carrega negócios
      loadBusinesses();
      
      // Regista Service Worker para PWA
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(console.error);
      }
      
      console.log('🇵🇹 Vilamoura Select loaded • Lang:', currentLanguage);
    });
  </script>
  
  <!-- ============================================ -->
  <!-- MINI-FIX: Garante que traduções funcionam -->
  <!-- ============================================ -->
  <script>
  setTimeout(() => {
    if (typeof businessTranslations !== 'undefined' && typeof renderBusinesses === 'function') {
      console.log('✅ Translations active • Businesses:', window.currentBusinesses?.length || 0);
      if (window.currentBusinesses?.length > 0) {
        renderBusinesses(window.currentBusinesses);
      }
    }
  }, 1500);
  </script>
</body>
