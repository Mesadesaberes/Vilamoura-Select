        const getInfoText = (info, lang) => {
            if (!info) return '';
            if (typeof info === 'object' && info[lang]) return info[lang];
            if (typeof info === 'object' && info.en) return info.en;
            if (typeof info === 'string') return info;
            return '';
        };
        const cleanImageUrl = (url) => { if (!url) return ''; return url.trim().replace(/\s+/g, ''); };
        const getPersonalizedMessage = (lang) => {
          const hour = new Date().getHours();
          const day = new Date().getDay();
          const isWeekend = day === 0 || day === 6;
          const messages = {
            pt: { morning: isWeekend ? "☀️ Bom fim de semana em Vilamoura!" : "☀️ Bom dia! Pronto para explorar?", lunch: "🍽️ Hora de almoço? Veja os nossos restaurantes!", afternoon: "🌊 Boa tarde! A marina espera por si.", evening: "🌙 Boa noite! Descubra a vida noturna.", night: "✨ Bem-vindo a Vilamoura!" },

          };
          const m = messages[lang] || messages.en;
          if (hour >= 6 && hour < 12) return m.morning;
          if (hour >= 12 && hour < 14) return m.lunch;
          if (hour >= 14 && hour < 19) return m.afternoon;
          if (hour >= 19 && hour < 23) return m.evening;
          return m.night;

        function App() {

          const t = i18n[lang] || i18n.en;
          const personalizedMessage = getPersonalizedMessage(lang);
          
          useEffect(() => {

            if (savedLang) { setLang(savedLang); setSelectedLang(savedLang); }
          }, []);
          
          const handleEnter = () => {

            if (hasSeenWelcome) { setView('menu'); } else { setView('welcome'); }
          };
          
          const handleStart = () => {

            setLang(selectedLang);
            setView('menu');
          };
          
          useEffect(() => {
            if (view === 'menu') {
                setLoading(true); setError(null);
                db.collection('locais').get()

                        const dados = snapshot.docs.map(doc => doc.data());
                        setLocais(dados); setLoading(false);
                        if (dados.length === 0) setError('Nenhum negócio encontrado.');
                    })
                    .catch((err) => { console.error("Erro Firestore:", err); setError('Erro ao carregar dados.'); setLoading(false); });
            }
          }, [view]);
          
          useEffect(() => {
            if (view === 'menu' && !googleMap.current && mapRef.current) {
                googleMap.current = new google.maps.Map(mapRef.current, {
                    center: { lat: 37.076, lng: -8.118 }, zoom: 15, disableDefaultUI: true,
                    styles: [{ featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }]
                });
                directionsRenderer.current = new google.maps.DirectionsRenderer({ 
                    map: googleMap.current, 
                    polylineOptions: { strokeColor: "#003366", strokeWeight: 5 },
                    suppressMarkers: true
                });
            }
          }, [view]);
          
          window.calcularRota = function(lat, lng) {
            console.log('🗺️ Botão Rota clicado - Destino:', lat, lng);
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            console.log('📱 É iOS?', isIOS);
            if (isIOS) {
              console.log('🍏 iOS: A abrir Apple Maps');
              window.open(`http://maps.apple.com/?daddr=${lat},${lng}`, '_blank');
              return;
            }
            console.log('🤖 Android/Desktop: A tentar rota interna');
            if (!navigator.geolocation) {
              console.log('❌ Geolocalização não suportada');
              alert('A geolocalização não é suportada. A abrir Google Maps...');
              window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
              return;
            }
            navigator.geolocation.getCurrentPosition(
              (pos) => {
                console.log('📍 Localização obtida:', pos.coords.latitude, pos.coords.longitude);
                const service = new google.maps.DirectionsService();
                service.route({
                  origin: { lat: pos.coords.latitude, lng: pos.coords.longitude },
                  destination: { lat: parseFloat(lat), lng: parseFloat(lng) },
                  travelMode: google.maps.TravelMode.WALKING
                }, (result, status) => {
                  console.log('🧭 Status da rota:', status);
                  if (status === 'OK' && directionsRenderer.current) {
                    console.log('✅ Rota calculada com sucesso!');
                    directionsRenderer.current.setDirections(result);
                  } else {
                    console.log('❌ Erro na rota:', status);
                    alert('Não foi possível calcular a rota. A abrir Google Maps...');
                    window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
                  }
                });
              },

              { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );

            if(directionsRenderer.current) directionsRenderer.current.setDirections({routes: []});

          // ✅ NAVEGAÇÃO: Clicar em categoria
          const handleCatClick = (cat) => {
            if (cat.subcats && cat.subcats.length > 0) {
              setCatAtiva(cat);
              setNavLevel('subcategorias');
            } else {
              setCatAtiva(cat);
              setSubcatAtiva(null);
              setNavLevel('locais');
            }
          };
          
          // ✅ NAVEGAÇÃO: Clicar em subcategoria
          const handleSubcatClick = (subcat) => {
            setSubcatAtiva(subcat);
            setNavLevel('locais');
          };
          
          // ✅ NAVEGAÇÃO: Voltar
          const handleBack = () => {
            if (navLevel === 'locais' && subcatAtiva) {
              setSubcatAtiva(null);
              setNavLevel('subcategorias');
            } else if (navLevel === 'locais' || navLevel === 'subcategorias') {
              setCatAtiva(null);
              setSubcatAtiva(null);
              setNavLevel('categorias');
            } else if (navLevel === 'mapa') {
              setNavLevel(catAtiva ? (subcatAtiva ? 'locais' : 'subcategorias') : 'categorias');
            }
          };
          
          // ✅ FILTRAR LOCAIS
          const getFilteredLocais = () => {
            let filtered = locais;
            if (query.length > 0) {
              filtered = filtered.filter(l => l.nome && l.nome.toLowerCase().includes(query.toLowerCase()));
            } else if (catAtiva) {
              filtered = filtered.filter(l => l.cat === catAtiva.id);
              if (subcatAtiva) {
                filtered = filtered.filter(l => l.subcat === subcatAtiva.id);
              }
            }
            return filtered;
          };
          
          const filtered = getFilteredLocais();
          
          if (view === 'splash') {
            return (<div className="splash-screen"><img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh2RRJgYenNf-1LjVFu47Lj4dmOnLy9PPAcXvXN2zLle3kx2vlEAQXtIs6_C6g9H-90RCQqjSj41N6ZfeDT35GG17m8VJ3-h4iC041wDTLKTZJ7QAs5511gf8OimILN-XyQlT4v3Brs7yWpQSqL_DuvLKJrLvacbYvb7y9VZFEOyZ6FVTwLtPFtI_Xt5nZG/w400-h225/Vilamoura-Select_YourIndependentGuidetoVilamoura_retangular_2-.gif" alt="Vilamoura Select" style={{ width: '95%', maxWidth: '420px', height: 'auto', marginBottom: '35px', borderRadius: '8px' }} /><div style={{ position: 'absolute', bottom: '40px', left: '0', right: '0', display: 'flex', justifyContent: 'center', padding: '0 20px' }}><button style={{ width: '210px', padding: '15px 24px', background: '#003366', color: '#ffffff', border: '2px solid #ffffff', borderRadius: '32px', fontWeight: 'bold', fontSize: '15px', cursor: 'pointer' }} onClick={handleEnter}>{t.enter}</button></div></div>);

          }
          
          return (
            <div style={{height: '100%'}}>
              <div className="lang-bar">{['pt','en','fr','de','es'].map(l => (<button key={l} className={`lang-btn ${lang === l ? 'active' : ''}`} onClick={() => setLang(l)}>{l.toUpperCase()}</button>))}</div>
              <div className="personalized-message">{personalizedMessage}</div>
              <div className="app-content">
                <div className="menu-view" style={{ display: navLevel !== 'mapa' ? 'block' : 'none' }}>
                  
                  {/* HEADER DE NAVEGAÇÃO */}
                  {navLevel !== 'categorias' && (
                    <div className="nav-header">
                      <button onClick={handleBack} className="btn-back-nav">← {t.back}</button>
                      <span className="nav-title">
                        {subcatAtiva ? subcatAtiva.nome : (catAtiva ? t.cats[catAtiva.id] : '')}
                      </span>
                    </div>
                  )}
                  
                  {/* SEARCH */}
                  <div className="search-area">
                    <div className="search-box">
                      <i className="fas fa-search"></i>
                      <input type="text" placeholder={t.search} value={query} onChange={(e) => {setQuery(e.target.value); if(navLevel !== 'categorias') setNavLevel('locais');}} />
                    </div>
                  </div>
                  
                  {error && <div className="error-msg">⚠️ {error}</div>}
                  
                  {loading ? (
                    <div className="loader"><i className="fas fa-spinner fa-spin"></i> {t.loading}</div>
                  ) : query.length > 0 || navLevel === 'locais' ? (
                    <div>
                      {filtered.length === 0 ? (
                        <div style={{padding:'20px', textAlign:'center', color:'#666'}}>Nenhum resultado</div>
                      ) : null}
                      {filtered.map(l => (
                        <div key={l.id || l.nome} className="item-row" onClick={() => openMap(l)}>
                          <img src={cleanImageUrl(l.img)} onError={(e) => {e.target.src='https://via.placeholder.com/50?text=?'}} />
                          <div>
                            <div style={{fontWeight:'bold'}}>{l.nome}</div>
                            <div style={{fontSize:11}}>{getInfoText(l.info, lang)}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : navLevel === 'categorias' ? (
                    <div>
                      <div className="grid-cats">
                        {CATEGORIAS.map(c => (
                          <div key={c.id} className="cat-card" onClick={() => handleCatClick(c)}>
                            <i className={`fas ${c.icon}`}></i>
                            <div>{t.cats[c.id]}</div>
                          </div>
                        ))}
                      </div>
                      <button className="explore-below-btn" onClick={() => openMap(locais)}>
                        <i className="fas fa-map-marked-alt"></i> {t.explore}
                      </button>
                    </div>
                  ) : navLevel === 'subcategorias' && catAtiva ? (
                    <div className="grid-cats">
                      {catAtiva.subcats.map(s => (
                        <div key={s.id} className="subcat-card" onClick={() => handleSubcatClick(s)}>
                          <i className={`fas ${s.icon}`}></i>
                          <div>{s.nome}</div>
                        </div>
                      ))}
                    </div>
                  ) : null}
                  
                </div>
                
                <div className="map-view" style={{ visibility: navLevel === 'mapa' ? 'visible' : 'hidden' }}>
                  <button className="btn-back-map" onClick={handleBack}>{t.back}</button>
                  <div ref={mapRef} id="map-canvas"></div>
                </div>
              </div>
            </div>
          );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/app/sw.js')
            .then(reg => { console.log('✅ Service Worker registado!', reg.scope); reg.update(); })
            .catch(err => console.log('❌ Erro no Service Worker:', err));
        });
      }
    </script>
</body>
