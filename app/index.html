<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vilamoura Select</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="manifest" href="/app/manifest.json">
<meta name="theme-color" content="#003366">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- Google Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCqRtZgE7hw-znacoAqXuXZ4SEGVuXWudo&libraries=places"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body, html { margin: 0; padding: 0; height: 100vh; width: 100%; overflow: hidden; background: #f4f7f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
#root { height: 100%; width: 100%; }
.app-content { height: calc(100vh - 90px); position: relative; width: 100%; }
.map-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; background: white; display: none; }
.map-view.active { display: block; }
#map-canvas { width: 100%; height: 100%; display: block; }
.btn-back-map { position: absolute; top: 15px; left: 15px; z-index: 30; padding: 10px 20px; border-radius: 25px; background: #003366; color: white; border: 2px solid white; font-weight: bold; cursor: pointer; }

/* Moldura Desktop Simplificada */
@media (min-width: 1025px) {
  body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; padding: 30px; min-height: 100vh; }
  #root { width: 390px; height: 844px; max-height: 90vh; background: #000; border-radius: 45px; padding: 10px; box-shadow: 0 0 0 2px #333, 0 25px 80px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
  #root::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 150px; height: 30px; background: #000; border-radius: 0 0 20px 20px; z-index: 1000; }
  #root::after { content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 10px; height: 10px; background: #1a1a2e; border-radius: 50%; z-index: 1001; }
  .desktop-info { position: fixed; bottom: 20px; right: 20px; color: rgba(255,255,255,0.7); font-size: 12px; text-align: right; z-index: 9999; }
}
@media (max-width: 768px) {
  body { background: #f4f7f9; padding: 0; display: block; }
  #root { width: 100%; height: 100%; border-radius: 0; padding: 0; box-shadow: none; background: #f4f7f9; }
  #root::before, #root::after, .desktop-info { display: none; }
}
</style>
</head>
<body>
<!-- ✅ HTML: Só isto no body (FORA do script) -->
<div id="root"></div>
<div class="desktop-info">
  <p>Vilamoura Select App</p>
  <p style="font-size: 11px; opacity: 0.7;">Vista de desktop (simulação mobile)</p>
</div>

<!-- ✅ SCRIPT: Só JavaScript/JSX aqui (SEM HTML) -->
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDfUDqEJxVnWbQgn6LEVQAjlKeBJdp0vyY",
  authDomain: "vilamoura-select.firebaseapp.com",
  projectId: "vilamoura-select",
  storageBucket: "vilamoura-select.firebasestorage.app",
  messagingSenderId: "189990454398",
  appId: "1:189990454398:web:3d9eac9cf3a84b0510c42f"
};
if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.firestore();

// App Component
function App() {
  const [view, setView] = useState('menu');
  const [navLevel, setNavLevel] = useState('mapa');
  const mapRef = useRef(null);
  const googleMap = useRef(null);

  // ✅ Inicializar Mapa
  useEffect(() => {
    if (view === 'menu' && navLevel === 'mapa' && mapRef.current && !googleMap.current) {
      try {
        googleMap.current = new google.maps.Map(mapRef.current, {
          center: { lat: 37.076, lng: -8.118 },
          zoom: 15,
          disableDefaultUI: true,
          styles: [{ featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }]
        });
        console.log('✅ Mapa inicializado');
      } catch (err) {
        console.error('❌ Erro ao inicializar mapa:', err);
      }
    }
  }, [view, navLevel]);

  return (
    <div style={{height: '100%'}}>
      <div className="app-content">
        <div className={`map-view ${navLevel === 'mapa' ? 'active' : ''}`}>
          <button className="btn-back-map" onClick={() => setNavLevel('categorias')}>← Voltar</button>
          <div ref={mapRef} id="map-canvas"></div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- ✅ Service Worker (FORA do script Babel) -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/app/sw.js')
      .then(reg => console.log('✅ Service Worker registado!', reg.scope))
      .catch(err => console.log('❌ Erro no Service Worker:', err));
  });
}
</script>
</body>
</html>
